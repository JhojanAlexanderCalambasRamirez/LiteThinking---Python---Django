sonar.projectKey=litethinking-2026
sonar.projectName=LiteThinking 2026 - Python React
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=frontend/src,backend/django_core,backend/services,domain/src

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/tests/**,\
  frontend/.next/**,\
  frontend/public/**,\
  **/poetry.lock,\
  **/package-lock.json

# Test sources
sonar.tests=backend/django_core/tests,domain/tests

# Python
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
