version: "3.9"

services:
  # --- PostgreSQL + pgvector ---
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: litethinking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Django Backend (port 8000) ---
  django:
    build:
      context: ./backend/django_core
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/django_core:/app
      - ./domain:/domain
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy

  # --- FastAPI Inventory Service (port 8001) ---
  inventory_service:
    build:
      context: ./backend/services/inventory_service
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend/services/inventory_service:/app
      - ./domain:/domain
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # --- FastAPI AI Agent (port 8002) ---
  ai_agent:
    build:
      context: ./backend/services/ai_agent
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./backend/services/ai_agent:/app
      - ./domain:/domain
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # --- Next.js Frontend (port 3000) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AI_AGENT_URL: http://localhost:8002
    depends_on:
      - django

volumes:
  postgres_data:
